<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Transaction - SimpleLedger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">SimpleLedger</a>
        <div>
            <a class="btn btn-outline-light btn-sm" href="/">Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/transactions">Transactions</a>
        </div>
    </div>
</nav>

<main class="container py-4">

    <div class="mb-4">
        <h1 class="fw-bold">Add Transaction</h1>
        <p class="text-muted">Record a new income or expense transaction.</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">

            <form th:action="@{/transactions/save}" th:object="${transaction}" method="post">

                <div class="mb-3">
                    <label class="form-label">Type</label>
                    <select class="form-select" th:field="*{type}">
                        <option value="">Select type</option>
                        <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{amount}" placeholder="Example: 50000">
                    <div class="text-danger small" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" class="form-control" th:field="*{category}" placeholder="Example: Sales, Rent, Transport">
                    <div class="text-danger small" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" class="form-control" th:field="*{description}" placeholder="Short description">
                    <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Transaction Date</label>
                    <input type="date" class="form-control" th:field="*{transactionDate}">
                    <div class="text-danger small" th:if="${#fields.hasErrors('transactionDate')}" th:errors="*{transactionDate}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Save Transaction</button>
                <a href="/transactions" class="btn btn-outline-secondary">Cancel</a>

            </form>

        </div>
    </div>

</main>

</body>

<footer class="text-center text-muted py-4 small">
    SimpleLedger &copy; 2026 — Spring Boot Accounting Demo
</footer>
</html>
