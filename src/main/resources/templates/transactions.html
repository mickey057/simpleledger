<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Transactions - SimpleLedger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">SimpleLedger</a>
            <div>
                <a class="btn btn-outline-light btn-sm" href="/">Dashboard</a>
                <a class="btn btn-warning btn-sm" href="/transactions/new">Add Transaction</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold">Transactions</h1>
                <p class="text-muted">All recorded income and expenses.</p>
            </div>
            <a href="/transactions/new" class="btn btn-primary">Add Transaction</a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div th:if="${#lists.isEmpty(transactions)}" class="text-muted">
                    No transactions found.
                </div>

                <div class="table-responsive" th:if="${!#lists.isEmpty(transactions)}">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th class="text-end">Amount</th>
                                <th class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="transaction : ${transactions}">
                                <td th:text="${transaction.transactionDate}">2026-01-01</td>

                                <td>
                                    <span th:if="${transaction.type.name() == 'INCOME'}"
                                        class="badge bg-success">INCOME</span>
                                    <span th:if="${transaction.type.name() == 'EXPENSE'}"
                                        class="badge bg-danger">EXPENSE</span>
                                </td>

                                <td th:text="${transaction.category}">Sales</td>
                                <td th:text="${transaction.description}">Description</td>

                                <td class="text-end fw-bold">
                                    <span
                                        th:text="${#numbers.formatDecimal(transaction.amount, 0, 'COMMA', 0, 'POINT')}">0</span>
                                    BIF
                                </td>

                                <td class="text-end">
                                    <a th:href="@{/transactions/delete/{id}(id=${transaction.id})}"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this transaction?')">
                                        Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </main>

</body>

<footer class="text-center text-muted py-4 small">
    SimpleLedger &copy; 2026 — Spring Boot Accounting Demo
</footer>

</html>
